        :root {
            --primary: #4a6372;
            --secondary: #d4a373; /* Altın/Toprak tonu */
            --bg-light: #fdfaf7;
            --text-dark: #2d3436;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            line-height: 1.8;
            background-color: var(--white);
            scroll-behavior: smooth;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Navigation */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 84%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 35px; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--secondary); }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 0 10%;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .hero p { font-size: 1.3rem; max-width: 700px; margin-bottom: 30px; font-weight: 300; }

        .btn-main {
            background: var(--secondary);
            color: var(--white);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .btn-main:hover { background: transparent; border-color: var(--white); }

        /* About Section */
        .about { padding: 100px 15%; display: flex; align-items: center; gap: 50px; background: var(--bg-light); }
        .about-text { flex: 1; }
        .about-img { flex: 1; border-radius: 20px; overflow: hidden; box-shadow: 20px 20px 0 var(--secondary); }
        .about-img img { width: 100%; display: block; filter: grayscale(20%); }

        /* Service Cards */
        .services { padding: 100px 10%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; }
        .card {
            padding: 40px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
            border-bottom: 4px solid transparent;
        }
